<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registra tu finca | ArrozGestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="registro.css">
</head>
<body>

  <div class="registro-card">
    <span class="registro-eyebrow">🌾 ArrozGestión</span>
    <h1>Registra tu finca</h1>
    <div class="subtitulo">Crea tu cuenta y empieza a gestionar tus lotes, labores y cosechas en minutos.</div>

    <div class="mensaje-error" id="mensajeError"></div>

    <form id="formRegistro">
      <div class="campo">
        <label>Nombre de la finca o asociación</label>
        <input type="text" id="nombreFinca" placeholder="Ej: Finca El Paraíso" required>
        <div class="campo-hint" id="slugHint"></div>
      </div>

      <div class="campo">
        <label>Nombre del propietario</label>
        <input type="text" id="propietario" placeholder="Tu nombre completo" required>
      </div>

      <div class="campo">
        <label>Ubicación</label>
        <input type="text" id="ubicacion" placeholder="Ej: Campoalegre, Huila" required>
      </div>

      <div class="campo">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
      </div>

      <button type="submit" class="btn-registrar" id="btnRegistrar">Registrar mi finca</button>
    </form>

  <div class="pie-registro">¿Ya tienes cuenta? <a href="login.html" style="color:var(--verde-tallo); font-weight:600; text-decoration:none;">Inicia sesión aquí</a></div>
  </div>

  <!-- ============ FIREBASE ============ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- ============ LÓGICA DEL MÓDULO ============ -->
  <script src="registro.js"></script>
</body>
</html>
